<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Friendship Slots</title>
<style>
  :root {
    --gold: #FFD700;
    --gold-glow: rgba(255, 215, 0, 0.35);
    --bg-dark: #0f0f12;
    --card-bg: #1a1a24;
    --win-green: #00E676;
    --panel-bg: #111116;
  }

  body { 
    text-align: center; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    background-color: var(--bg-dark); 
    color: #f5f5f7; 
    margin: 0;
    padding: 20px 12px; 
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    box-sizing: border-box;
    justify-content: center;
  }

  h1 {
    font-size: 2rem;
    margin: 0 0 20px 0;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
  }
  
  .slot-machine { 
    width: 100%;
    max-width: 480px; 
    background: var(--card-bg); 
    padding: 24px; 
    border-radius: 24px; 
    border: 1px solid rgba(255, 215, 0, 0.2); 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 40px var(--gold-glow);
    box-sizing: border-box;
  }
  
  .grid-container {
    position: relative;
    background: var(--panel-bg);
    padding: 12px;
    border-radius: 16px;
    border: 2px solid #2a2a3a;
    margin-bottom: 20px;
    box-shadow: inset 0 4px 20px rgba(0,0,0,0.6);
  }

  .grid { 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 10px; 
    position: relative;
  }
  
  .payline {
    position: absolute;
    top: 50%;
    left: -12px;
    right: -12px;
    height: 4px;
    background: linear-gradient(90deg, transparent, #ff3366, #ff3366, transparent);
    transform: translateY(-50%);
    z-index: 10;
    pointer-events: none;
    box-shadow: 0 0 10px #ff3366;
  }
  
  .cell { 
    width: 100%; 
    aspect-ratio: 1 / 1; 
    background: #0a0a0f; 
    overflow: hidden; 
    border-radius: 12px; 
    border: 1px solid #3a3a4a;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s ease-out;
  }
  
  .cell img { 
    width: 85%; 
    height: 85%; 
    object-fit: contain; 
    display: block;
    transition: filter 0.1s ease;
  }

  .blur-effect img {
    filter: blur(4px);
    transform: scaleY(1.2);
  }
  
  button { 
    width: 100%;
    padding: 16px 0; 
    font-size: 1.35rem; 
    cursor: pointer; 
    background: linear-gradient(135deg, #FFE043 0%, #D4AF37 100%);
    color: #000; 
    border: none; 
    border-radius: 14px; 
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
    transition: all 0.2s ease;
  }
  
  button:hover:not(:disabled) { 
    background: linear-gradient(135deg, #fff 0%, #FFE043 100%);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
  }

  button:active:not(:disabled) {
    transform: translateY(1px);
  }

  button:disabled { 
    background: #2a2a35; 
    color: #5a5a6a; 
    cursor: not-allowed; 
    box-shadow: none;
    transform: none;
  }
  
  #message { 
    margin: 15px 0; 
    font-size: 1.2rem; 
    font-weight: 600; 
    min-height: 28px; 
    letter-spacing: 0.5px;
  }
  
  .stats {
    color: #a0a0b0;
    font-size: 0.95rem;
    background: var(--panel-bg);
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #22222a;
    display: flex;
    justify-content: space-around;
    align-items: center;
  }

  .stat-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #6a6a7a;
  }
  
  .balance-highlight { 
    color: var(--win-green); 
    font-weight: 700; 
    font-size: 1.4rem; 
  }

  .spin-highlight {
    color: #fff;
    font-weight: 700;
    font-size: 1.4rem;
  }
  
  #bonus-popup { 
    display: none; 
    position: fixed; 
    top: 50%; 
    left: 50%; 
    width: 88%;
    max-width: 400px;
    transform: translate(-50%, -50%); 
    background: linear-gradient(145deg, #8b0000 0%, #4a0000 100%); 
    color: white; 
    padding: 35px 25px; 
    border-radius: 24px; 
    font-size: 1.8rem; 
    font-weight: 800; 
    z-index: 1000; 
    text-align: center; 
    box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 50px rgba(255, 0, 0, 0.4);
    border: 2px solid rgba(255,255,255,0.1);
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    box-sizing: border-box;
  }

  #bonus-popup .sub-text {
    font-size: 1.1rem;
    font-weight: 400;
    color: #ffb3b3;
    margin-top: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  
  #overlay { 
    display: none; 
    position: fixed; 
    top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(5, 5, 8, 0.85); 
    backdrop-filter: blur(8px);
    z-index: 999; 
  }

  @keyframes popIn {
    0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<audio id="bgMusic" loop autoplay>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<audio id="scarySound">
  <source src="scary.mp3" type="audio/mpeg">
</audio>
<audio id="coinSound">
  <source src="coin.mp3" type="audio/mpeg">
</audio>

<h1>The Friendship Slots</h1>

<div class="slot-machine">
  <div class="grid-container">
    <div class="payline"></div>
    <div class="grid" id="grid">
      <div class="cell" id="box0"><img src="img1.png" id="c0"></div>
      <div class="cell" id="box1"><img src="img2.png" id="c1"></div>
      <div class="cell" id="box2"><img src="img3.png" id="c2"></div>
      <div class="cell" id="box3"><img src="img2.png" id="c3"></div>
      <div class="cell" id="box4"><img src="img3.png" id="c4"></div>
      <div class="cell" id="box5"><img src="img1.png" id="c5"></div>
      <div class="cell" id="box6"><img src="img3.png" id="c6"></div>
      <div class="cell" id="box7"><img src="img1.png" id="c7"></div>
      <div class="cell" id="box8"><img src="img2.png" id="c8"></div>
    </div>
  </div>
  
  <button id="spinBtn" onclick="startSpin()">Spin (1€)</button>
  <div id="message"></div>
  
  <div class="stats">
    <div class="stat-block">
      <span class="stat-label">Υπόλοιπο</span>
      <span><span id="balanceDisplay" class="balance-highlight">10</span>€</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">Στροφές</span>
      <span id="spinCount" class="spin-highlight">0</span>
    </div>
  </div>
</div>

<div id="overlay" onclick="closeBonus()"></div>
<div id="bonus-popup" onclick="closeBonus()">
  ΜΠΗΚΕΣ ΜΠΟΝΟΥΣ
  <div class="sub-text">Κάνε ταυτοποίηση</div>
</div>

<script>
  const images = ['img1.png', 'img2.png', 'img3.png'];
  let spins = 0;
  let balance = 10;
  const bet = 1;
  let isSpinning = false;
  let musicStarted = false;

  window.onload = function() {
    let music = document.getElementById('bgMusic');
    music.volume = 0.5;
    
    music.play().then(() => {
      musicStarted = true;
    }).catch(() => {
      document.body.addEventListener('click', function startAudio() {
        if (!musicStarted) {
           music.play();
           musicStarted = true;
        }
        document.body.removeEventListener('click', startAudio);
      });
    });
  };

  // Keyboard spacebar trigger
  window.addEventListener('keydown', function(e) {
    if (e.code === 'Space' || e.key === ' ') {
      e.preventDefault(); 
      startSpin();
    }
  });

  function getRandomImage() {
    return images[Math.floor(Math.random() * images.length)];
  }

  function startSpin() {
    if (isSpinning) return;

    if (balance < bet) {
      document.getElementById('message').innerText = "Δεν έχεις αρκετά χρήματα!";
      document.getElementById('message').style.color = "#ff3366";
      return;
    }

    let coinAudio = document.getElementById('coinSound');
    coinAudio.volume = 0.1;
    coinAudio.currentTime = 0;
    coinAudio.play().catch(e => console.log("Audio blocked"));

    balance -= bet;
    updateBalanceDisplay();

    isSpinning = true;
    spins++;
    
    document.getElementById('spinCount').innerText = spins;
    document.getElementById('message').innerText = "Γυρνάει...";
    document.getElementById('message').style.color = "#a0a0b0";
    document.getElementById('spinBtn').disabled = true;

    for(let i = 0; i < 9; i++) {
      document.getElementById('box' + i).classList.add('blur-effect');
    }

    let spinInterval = setInterval(() => {
      for(let i = 0; i < 9; i++) {
         document.getElementById('c'+i).src = getRandomImage();
      }
    }, 80); 

    setTimeout(() => {
      clearInterval(spinInterval);
      for(let i = 0; i < 9; i++) {
        document.getElementById('box' + i).classList.remove('blur-effect');
      }
      finalizeSpin();
    }, 1500); 
  }

  function finalizeSpin() {
    let middleRow = [];
    
    if (spins === 10) {
      for(let i = 0; i < 9; i++) {
        let img = (i >= 3 && i <= 5) ? 'img2.png' : getRandomImage(); 
        document.getElementById('c'+i).src = img;
        if(i >= 3 && i <= 5) middleRow.push(img);
      }
    } else {
      for(let i = 0; i < 9; i++) {
         let img = getRandomImage();
         document.getElementById('c'+i).src = img;
         if(i >= 3 && i <= 5) middleRow.push(img);
      }
    }

    checkWin(middleRow);
    isSpinning = false;
    document.getElementById('spinBtn').disabled = false;
  }

  function checkWin(row) {
    if (spins === 10) {
      document.getElementById('bgMusic').pause(); 
      let scaryAudio = document.getElementById('scarySound');
      scaryAudio.volume = 1.0;
      scaryAudio.currentTime = 0;
      scaryAudio.play();

      document.getElementById('overlay').style.display = 'block';
      document.getElementById('bonus-popup').style.display = 'block';
      document.getElementById('message').innerText = "";
      return;
    }

    let uniqueSymbols = new Set(row);
    
    if (uniqueSymbols.size === 1) {
      let winnings = bet * 3;
      balance += winnings;
      updateBalanceDisplay();
      
      document.getElementById('message').innerText = `Κέρδισες ${winnings}€!`;
      document.getElementById('message').style.color = "#00E676"; // Fixed: Changed from raw CSS variable syntax to string color literal
    } else {
      document.getElementById('message').innerText = "Δεν κέρδισες. Ξανά προσπάθησε!";
      document.getElementById('message').style.color = "#6a6a7a"; 
    }
  }

  function updateBalanceDisplay() {
    document.getElementById('balanceDisplay').innerText = balance;
  }

  function closeBonus() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('bonus-popup').style.display = 'none';
    document.getElementById('bgMusic').play(); 
  }
</script>
</body>
</html>
