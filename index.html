<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Friendship Slots</title>
<style>
  body { 
    text-align: center; 
    font-family: Arial, sans-serif; 
    background-color: #1a1a1a; 
    color: white; 
    margin: 0;
    padding: 10px 5px; 
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .slot-machine { 
    width: 100%;
    max-width: 550px; 
    background: #2a2a2a; 
    padding: 12px; 
    border-radius: 12px; 
    border: 4px solid #d4af37; 
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
    box-sizing: border-box;
  }
  
  .grid { 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 5px; 
    margin-bottom: 15px; 
    position: relative;
  }
  
  .payline {
    position: absolute;
    top: 50%;
    left: -5px;
    right: -5px;
    height: 4px;
    background-color: rgba(255, 0, 0, 0.6);
    transform: translateY(-50%);
    z-index: 10;
    pointer-events: none;
  }
  
  .cell { 
    width: 100%; 
    aspect-ratio: 1 / 1; 
    height: auto; 
    background: #111; 
    overflow: hidden; 
    border-radius: 6px; 
    border: 2px solid #444;
    box-sizing: border-box;
  }
  
  .cell img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    display: block;
  }
  
  button { 
    width: 100%;
    padding: 18px 0; 
    font-size: 26px; 
    cursor: pointer; 
    background-color: #d4af37; 
    color: black; 
    border: none; 
    border-radius: 8px; 
    font-weight: bold;
    text-transform: uppercase;
    transition: background-color 0.2s;
    margin-top: 5px;
  }
  
  button:hover:not(:disabled) { background-color: #f1c40f; }
  button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
  
  #message { 
    margin-top: 15px; 
    font-size: 24px; 
    font-weight: bold; 
    min-height: 35px; 
  }
  
  .stats {
    margin-top: 10px;
    color: #fff;
    font-size: 18px;
    background: #111;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #444;
    display: flex;
    justify-content: space-around;
  }
  
  .balance-highlight { color: #4CAF50; font-weight: bold; font-size: 24px; }
  
  #bonus-popup { 
    display: none; 
    position: fixed; 
    top: 50%; 
    left: 50%; 
    width: 90%;
    max-width: 450px;
    transform: translate(-50%, -50%); 
    background: #8b0000; 
    color: white; 
    padding: 30px 20px; 
    border-radius: 15px; 
    font-size: 32px; 
    font-weight: bold; 
    z-index: 1000; 
    text-align: center; 
    box-shadow: 0 0 50px rgba(255, 0, 0, 0.9);
    border: 4px solid black;
    animation: popIn 0.2s ease-out forwards;
    box-sizing: border-box;
  }
  
  #overlay { 
    display: none; 
    position: fixed; 
    top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.9); 
    z-index: 999; 
  }

  @keyframes popIn {
    0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<audio id="bgMusic" loop autoplay>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<audio id="scarySound">
  <source src="scary.mp3" type="audio/mpeg">
</audio>
<audio id="coinSound">
  <source src="coin.mp3" type="audio/mpeg">
</audio>

<h1 style="font-size: 26px; margin: 10px 0 15px 0;">The Friendship Slots</h1>

<div class="slot-machine">
  <div class="grid" id="grid">
    <div class="payline"></div>
    <div class="cell"><img src="img1.png" id="c0"></div>
    <div class="cell"><img src="img2.png" id="c1"></div>
    <div class="cell"><img src="img3.png" id="c2"></div>
    <div class="cell"><img src="img2.png" id="c3"></div>
    <div class="cell"><img src="img3.png" id="c4"></div>
    <div class="cell"><img src="img1.png" id="c5"></div>
    <div class="cell"><img src="img3.png" id="c6"></div>
    <div class="cell"><img src="img1.png" id="c7"></div>
    <div class="cell"><img src="img2.png" id="c8"></div>
  </div>
  
  <button id="spinBtn" onclick="startSpin()">Spin (1€)</button>
  <div id="message"></div>
  
  <div class="stats">
    <span>Υπόλοιπο: <span id="balanceDisplay" class="balance-highlight">10</span>€</span>
    <span>Στροφές: <span id="spinCount">0</span></span>
  </div>
</div>

<div id="overlay" onclick="closeBonus()"></div>
<div id="bonus-popup" onclick="closeBonus()">ΜΠΗΚΕΣ ΜΠΟΝΟΥΣ<br>ΚΑΝΕ ΤΑΥΤΟΠΟΙΗΣΗ</div>

<script>
  const images = ['img1.png', 'img2.png', 'img3.png'];
  let spins = 0;
  let balance = 10;
  const bet = 1;
  let isSpinning = false;
  let musicStarted = false;

  window.onload = function() {
    let music = document.getElementById('bgMusic');
    music.volume = 0.5;
    
    music.play().then(() => {
      musicStarted = true;
    }).catch(() => {
      document.body.addEventListener('click', function startAudio() {
        if (!musicStarted) {
           music.play();
           musicStarted = true;
        }
        document.body.removeEventListener('click', startAudio);
      });
    });
  };

  function getRandomImage() {
    return images[Math.floor(Math.random() * images.length)];
  }

  function startSpin() {
    if (isSpinning) return;

    if (balance < bet) {
      document.getElementById('message').innerText = "Δεν έχεις αρκετά χρήματα!";
      document.getElementById('message').style.color = "#f44336";
      return;
    }

    // --- NEW COIN SOUND LOGIC ---
    let coinAudio = document.getElementById('coinSound');
    coinAudio.volume = 0.1;
    coinAudio.currentTime = 0; // Rewinds to the start instantly
    coinAudio.play().catch(e => console.log("Audio blocked until interaction"));
    // ----------------------------

    balance -= bet;
    updateBalanceDisplay();

    isSpinning = true;
    spins++;
    
    document.getElementById('spinCount').innerText = spins;
    document.getElementById('message').innerText = "Γυρνάει...";
    document.getElementById('message').style.color = "white";
    document.getElementById('spinBtn').disabled = true;

    let spinInterval = setInterval(() => {
      for(let i = 0; i < 9; i++) {
         document.getElementById('c'+i).src = getRandomImage();
      }
    }, 100); 

    setTimeout(() => {
      clearInterval(spinInterval);
      finalizeSpin();
    }, 1500); 
  }

  function finalizeSpin() {
    let middleRow = [];
    
    if (spins === 10) {
      for(let i = 0; i < 9; i++) {
        let img = (i >= 3 && i <= 5) ? 'img2.png' : getRandomImage(); 
        document.getElementById('c'+i).src = img;
        if(i >= 3 && i <= 5) middleRow.push(img);
      }
    } else {
      for(let i = 0; i < 9; i++) {
         let img = getRandomImage();
         document.getElementById('c'+i).src = img;
         if(i >= 3 && i <= 5) middleRow.push(img);
      }
    }

    checkWin(middleRow);
    isSpinning = false;
    document.getElementById('spinBtn').disabled = false;
  }

  function checkWin(row) {
    if (spins === 10) {
      document.getElementById('bgMusic').pause(); 
      let scaryAudio = document.getElementById('scarySound');
      scaryAudio.volume = 1.0;
      scaryAudio.currentTime = 0; // Ensures the scary sound also plays from start
      scaryAudio.play();

      document.getElementById('overlay').style.display = 'block';
      document.getElementById('bonus-popup').style.display = 'block';
      document.getElementById('message').innerText = "";
      return;
    }

    let uniqueSymbols = new Set(row);
    
    if (uniqueSymbols.size === 1) {
      let winnings = bet * 3;
      balance += winnings;
      updateBalanceDisplay();
      
      document.getElementById('message').innerText = `Κέρδισες ${winnings}€!`;
      document.getElementById('message').style.color = "#4CAF50"; 
    } else {
      document.getElementById('message').innerText = "Δεν κέρδισες. Ξανά προσπάθησε!";
      document.getElementById('message').style.color = "#aaa"; 
    }
  }

  function updateBalanceDisplay() {
    document.getElementById('balanceDisplay').innerText = balance;
  }

  function closeBonus() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('bonus-popup').style.display = 'none';
    document.getElementById('bgMusic').play(); 
  }
</script>
</body>
</html>
